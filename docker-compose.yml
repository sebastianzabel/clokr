name: clokr

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clokr
      POSTGRES_PASSWORD: password
      POSTGRES_DB: clokr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clokr -d clokr"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      API_PORT: "4000"
      API_HOST: "0.0.0.0"
      DATABASE_URL: "postgresql://clokr:password@postgres:5432/clokr"
      JWT_SECRET: "clokr-dev-secret-key-min-32-characters!"
      JWT_REFRESH_SECRET: "clokr-dev-refresh-secret-min-32-chars!"
      JWT_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
      CORS_ORIGIN: "http://localhost:3000"
      REDIS_URL: "redis://redis:6379"
      APP_URL: "http://localhost:3000"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-clokr-dev-encryption-key-min-32-characters-long!!}"
      SEED_DEMO_DATA: "${SEED_DEMO_DATA:-true}"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      ORIGIN: "http://localhost:3000"
      API_URL: "http://api:4000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    depends_on:
      api:
        condition: service_healthy

  backup:
    image: postgres:18-alpine
    environment:
      PGHOST: postgres
      PGUSER: clokr
      PGPASSWORD: password
      PGDATABASE: clokr
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c 'while true; do
        pg_dump -Fc > /backups/clokr_$$(date +%Y%m%d_%H%M%S).dump &&
        echo "Backup completed" &&
        find /backups -name "*.dump" -mtime +7 -delete;
        sleep 86400;
      done'
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - backup

volumes:
  postgres_data:
  redis_data:
  minio_data:
