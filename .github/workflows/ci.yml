name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  pull-requests: write
  issues: write

env:
  REGISTRY: ghcr.io

jobs:
  # ── Tests, Lint, Type-Check (PR only) ───────────────────────────────
  # No need to re-test on main — the PR was already green before merge.
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: clokr
          POSTGRES_PASSWORD: password
          POSTGRES_DB: clokr
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://clokr:password@localhost:5432/clokr
      JWT_SECRET: test-jwt-secret-min-32-characters-long
      JWT_REFRESH_SECRET: test-refresh-secret-min-32-characters
      ENCRYPTION_KEY: test-encryption-key-min-32-characters-long!!
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @clokr/db exec prisma generate

      - name: Push schema to test DB
        run: pnpm --filter @clokr/db exec prisma db push

      - name: Lint
        id: lint
        run: |
          LINT_OUTPUT=$(pnpm --filter @clokr/api exec eslint src/ --no-warn-ignored 2>&1) || true
          LINT_ERRORS=$(echo "$LINT_OUTPUT" | grep -c "error" || true)
          LINT_WARNINGS=$(echo "$LINT_OUTPUT" | grep -c "warning" || true)
          echo "errors=${LINT_ERRORS:-0}" >> $GITHUB_OUTPUT
          echo "warnings=${LINT_WARNINGS:-0}" >> $GITHUB_OUTPUT
          echo "$LINT_OUTPUT"

      - name: Type check API
        id: typecheck
        run: |
          npx tsc --noEmit -p apps/api/tsconfig.json 2>&1 | tee /tmp/tsc-output.txt || true
          TSC_ERRORS=$(grep -c "error TS" /tmp/tsc-output.txt || true)
          echo "errors=${TSC_ERRORS:-0}" >> $GITHUB_OUTPUT

      - name: Run tests
        id: tests
        run: |
          cd apps/api && npx vitest run --reporter=verbose 2>&1 | tee /tmp/test-output.txt
          PASSED=$(grep -oP '\d+ passed' /tmp/test-output.txt | head -1 | grep -oP '\d+' || true)
          FAILED=$(grep -oP '\d+ failed' /tmp/test-output.txt | head -1 | grep -oP '\d+' || true)
          SUITES=$(grep -oP '\d+ passed' /tmp/test-output.txt | tail -1 | grep -oP '\d+' || true)
          echo "passed=${PASSED:-0}" >> $GITHUB_OUTPUT
          echo "failed=${FAILED:-0}" >> $GITHUB_OUTPUT
          echo "suites=${SUITES:-0}" >> $GITHUB_OUTPUT

      - name: Audit dependencies
        run: pnpm audit --prod || true
        continue-on-error: true

      - name: Build API
        id: build_api
        run: pnpm --filter @clokr/api build

      - name: Build Web
        id: build_web
        run: |
          pnpm --filter @clokr/web build 2>&1 | tee /tmp/web-build.txt
          SVELTE_WARNINGS=$(grep -c "vite-plugin-svelte" /tmp/web-build.txt || true)
          echo "warnings=${SVELTE_WARNINGS:-0}" >> $GITHUB_OUTPUT

      - name: Post PR Summary
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ steps.tests.outputs.passed }}';
            const failed = '${{ steps.tests.outputs.failed }}';
            const suites = '${{ steps.tests.outputs.suites }}';
            const tscErrors = '${{ steps.typecheck.outputs.errors }}';
            const lintErrors = '${{ steps.lint.outputs.errors }}';
            const lintWarnings = '${{ steps.lint.outputs.warnings }}';
            const svelteWarnings = '${{ steps.build_web.outputs.warnings }}';

            const testIcon = failed === '0' ? '✅' : '❌';
            const tscIcon = tscErrors === '0' ? '✅' : '❌';
            const lintIcon = lintErrors === '0' ? '✅' : '⚠️';
            const buildIcon = '✅';

            const body = `## CI Summary

            | Check | Status | Details |
            |-------|--------|---------|
            | ${testIcon} Tests | **${passed} passed**, ${failed} failed | ${suites} suites |
            | ${tscIcon} TypeScript | ${tscErrors} errors | \`tsc --noEmit\` |
            | ${lintIcon} Lint | ${lintErrors} errors, ${lintWarnings} warnings | ESLint |
            | ${buildIcon} API Build | Success | \`tsc\` |
            | ${buildIcon} Web Build | Success | ${svelteWarnings} Svelte warnings |
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('## CI Summary'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── Docker Build ────────────────────────────────────────────────────
  # PR:   build only (validates Dockerfile, warms GHA cache) — no push
  # Main: build + push with sha-<commit> tag (ready for release promotion)
  #
  # On PR this depends on tests passing first.
  # On main push (after merge) it runs immediately — tests already passed in the PR.
  docker:
    needs: test
    if: always() && (needs.test.result == 'success' || (github.event_name == 'push' && needs.test.result == 'skipped'))
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - image: clokr-api
            dockerfile: ./apps/api/Dockerfile
            context: .
          - image: clokr-web
            dockerfile: ./apps/web/Dockerfile
            context: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "owner=${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          # Only push on merge to main, not on PRs
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/${{ matrix.image }}:sha-${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
