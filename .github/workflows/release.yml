name: Release — Promote & Publish

# Triggered when a GitHub Release is published (which creates a git tag).
# Promotes the existing SHA-tagged image to semver + latest tags.
# No rebuild, no rescan — the image was already built and scanned on main.

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        image: [clokr-api, clokr-web]

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          VERSION=${GITHUB_REF_NAME#v}
          MAJOR_MINOR=$(echo "$VERSION" | grep -oP '^\d+\.\d+')
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "owner=${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Promote image (retag sha → version + latest)
        run: |
          SRC="${REGISTRY}/${{ steps.meta.outputs.owner }}/${{ matrix.image }}:sha-${{ steps.meta.outputs.sha }}"

          echo "Promoting ${SRC} →"
          echo "  ${{ steps.meta.outputs.version }}"
          echo "  ${{ steps.meta.outputs.major_minor }}"
          echo "  latest"

          crane copy "${SRC}" "${REGISTRY}/${{ steps.meta.outputs.owner }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}"
          crane copy "${SRC}" "${REGISTRY}/${{ steps.meta.outputs.owner }}/${{ matrix.image }}:${{ steps.meta.outputs.major_minor }}"
          crane copy "${SRC}" "${REGISTRY}/${{ steps.meta.outputs.owner }}/${{ matrix.image }}:latest"
